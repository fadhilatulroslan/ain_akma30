<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Assignify Alarm Tone
  </title>

  <link
    rel="stylesheet"
    href="alarm-tone.css"
  >

  <script src="jquery-4.0.0.js"></script>

</head>
<body>

  <div class="container">

    <h1>
      🎵 Alarm Tone
    </h1>

    <p class="subtitle">
      Select your preferred ringtone
    </p>

    <!-- TONE LIST -->

    <div
      class="tone-list"
      id="toneList"
    ></div>

    <!-- SAVE -->

    <button onclick="saveTone()">
      Save Tone 🚀
    </button>

    <!-- BACK -->

    <div
      class="back"
      onclick="goBack()"
    >

      ← Back to Profile

    </div>

  </div>

  <script src="alarm-tone.js"></script>

</body>
</html>
