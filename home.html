<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

  <title>Assignify – Home</title>

  <link rel="stylesheet" href="home.css"/>

  <script src="jquery-4.0.0.js"></script>

</head>

<body>

  <div class="page-wrapper">

    <!-- Header -->
    <div class="page-header">

      <div>
        <div class="subtext">
          Good day! 🌟
        </div>

        <div class="page-title">
          Your Assignments
        </div>
      </div>

     <div class="header-right">

  <button
    class="mail-btn"
    onclick="window.location.href='notifications.html'"
  >


   <img src="mail.jpg">

    <span class="notif-dot"></span>

  </button>

</div>

    </div>

    <!-- Stats -->
    <div class="stats-row">

      <div class="stat-card">
        <div class="stat-num pending-num">0</div>
        <div class="stat-lbl">Pending</div>
      </div>

      <div class="stat-card">
        <div class="stat-num done-num">0</div>
        <div class="stat-lbl">Done</div>
      </div>

      <div class="stat-card">
        <div class="stat-num total-num">0</div>
        <div class="stat-lbl">Total</div>
      </div>

    </div>

    <!-- Pending -->
    <div class="list-area">

      <div class="section-title">
        📌 In Progress
      </div>

      <div id="pending-list"></div>

      <!-- Completed -->
      <div class="section-title completed-title">
        ✅ Completed
      </div>

      <div id="completed-list"></div>

    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">

    <button class="nav-btn active">
      <img src="home.jpg">
      <span>Home</span>
    </button>

    <button class="nav-btn" onclick="window.location.href='calendar.html'">
      <img src="calendar.png">
      <span>Calendar</span>
    </button>

   <button class="nav-btn" onclick="window.location.href='add-assignment.html'">
      <img src="add.png">
      <span>ADD</span>
    </button>

    <button class="nav-btn" onclick="window.location.href='ai-owl.html'">
  <img src="owlai.png">
  <span>AI Owl</span>
</button>

    <button
      class="nav-btn"
      onclick="window.location.href='profile.html'"
    >
      <img src="profile.png">
      <span>Profile</span>
    </button>

  <!-- MUSIC BUTTON -->
  <button id="musicToggleBtnHeader" onclick="toggleMusic()">
    🔊
  </button>
  </nav>

  <script src="theme.js"></script>
  <script src="home.js"></script>

</body>
</html>
