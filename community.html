<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FIXORA • Community</title>
    <link rel="stylesheet" href="css/inventra.css">
    <link rel="stylesheet" href="css/community.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="app">
    
    <div class="top">
        <img src="images/third.jpg" alt="Fixora Logo" style="width: 28px; height: 28px; object-fit: cover; border-radius: 8px;">
        <h1>community</h1>
        <p>share • ask • help each other</p>
    </div>

    <div class="welcome-card">
        <div class="welcome-text">🤝 Join the conversation</div>
        <div class="welcome-sub">Share your laptop experience with others</div>
    </div>

    <div class="post-btn">
        <button id="newPostBtn">✏️ Create New Post</button>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active">Latest</button>
        <button class="filter-tab">Trending</button>
        <button class="filter-tab">My Posts</button>
    </div>

    <div class="block" id="postsContainer">
        <!-- Posts will load here -->
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav"><span class="nav-icon">🏠</span><span>home</span></a>
        <a href="shops.html" class="nav"><span class="nav-icon">📍</span><span>shops</span></a>
        <a href="community.html" class="nav active"><span class="nav-icon">💬</span><span>community</span></a>
        <a href="profile.html" class="nav"><span class="nav-icon">👤</span><span>profile</span></a>
    </div>

</div>

<script src="js/main.js"></script>
<script src="js/community.js"></script>
</body>
</html>
