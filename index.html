<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dual Universe • Choose Your Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: none;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    position: relative;
    overflow: hidden;
    font-family: 'Instrument Sans', sans-serif;
}

/* Custom Cursor */
.custom-cursor {
    width: 32px;
    height: 32px;
    background: radial-gradient(circle, rgba(224,26,140,0.6), rgba(224,26,140,0));
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
    mix-blend-mode: screen;
}

.custom-cursor-dot {
    width: 6px;
    height: 6px;
    background: #ff6b9d;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 10000;
}

/* Particle Canvas */
#particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* Animated Background Portals */
.portal-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

.portal-left {
    position: absolute;
    width: 60%;
    height: 120%;
    background: radial-gradient(circle at center, rgba(224,26,140,0.15), transparent 70%);
    top: -10%;
    left: -20%;
    filter: blur(60px);
    animation: pulseLeft 6s infinite alternate;
}

.portal-right {
    position: absolute;
    width: 60%;
    height: 120%;
    background: radial-gradient(circle at center, rgba(124,58,237,0.15), transparent 70%);
    top: -10%;
    right: -20%;
    filter: blur(60px);
    animation: pulseRight 6s infinite alternate;
}

@keyframes pulseLeft {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.3); opacity: 0.8; }
}

@keyframes pulseRight {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.3); opacity: 0.8; }
}

.container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 650px;
    padding: 20px;
}

/* Portal Card */
.portal-card {
    background: rgba(10, 10, 20, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 48px;
    padding: 40px 28px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
}

.title h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    font-weight: 400;
    background: linear-gradient(135deg, #ff6b9d, #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
    margin-bottom: 8px;
}

.title p {
    font-size: 14px;
    color: #94a3b8;
    letter-spacing: 1px;
}

/* Dual Universe Grid */
.dual-grid {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 35px 0 30px;
}

/* Portal Cards */
.portal {
    flex: 1;
    min-width: 170px;
    background: rgba(15, 15, 25, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 35px;
    padding: 25px 16px;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(255, 255, 255, 0.05);
    position: relative;
    overflow: hidden;
}

/* Portal glow effect */
.portal::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transition: left 0.6s;
}

.portal:hover::before {
    left: 100%;
}

/* Akma Portal */
.portal.akma {
    border-image: none;
    box-shadow: 0 0 20px rgba(224, 26, 140, 0.2);
}

.portal.akma:hover {
    transform: translateY(-15px) scale(1.02);
    background: rgba(224, 26, 140, 0.15);
    border-color: #e01a8c;
    box-shadow: 0 30px 60px rgba(224, 26, 140, 0.4);
}

/* Assignify Portal */
.portal.assignify {
    border-image: none;
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
}

.portal.assignify:hover {
    transform: translateY(-15px) scale(1.02);
    background: rgba(124, 58, 237, 0.15);
    border-color: #7c3aed;
    box-shadow: 0 30px 60px rgba(124, 58, 237, 0.4);
}

/* Avatar */
.portal-avatar {
    width: 100px;
    height: 100px;
    margin: 0 auto 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: all 0.3s;
    position: relative;
}

.portal:hover .portal-avatar {
    transform: scale(1.05);
}

.akma .portal-avatar {
    background: radial-gradient(circle, #e01a8c, #ff6b9d);
    box-shadow: 0 0 20px rgba(224, 26, 140, 0.5);
}

.assignify .portal-avatar {
    background: radial-gradient(circle, #7c3aed, #c084fc);
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
}

.portal-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Assignify - gambar asli */
.assignify .portal-avatar img {
    filter: none;
    object-fit: cover;
}

/* Portal Name */
.portal-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 6px;
}

.akma .portal-name {
    color: #ff6b9d;
    text-shadow: 0 0 10px rgba(224, 26, 140, 0.5);
}

.assignify .portal-name {
    color: #c084fc;
    text-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
}

/* Role Badge */
.portal-role {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 30px;
    display: inline-block;
    margin-bottom: 10px;
}

.akma .portal-role {
    background: rgba(224, 26, 140, 0.2);
    color: #ff6b9d;
}

.assignify .portal-role {
    background: rgba(124, 58, 237, 0.2);
    color: #c084fc;
}

/* Description */
.portal-desc {
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.4;
}

/* Footer */
.portal-footer {
    margin-top: 25px;
    padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.portal-footer p {
    font-size: 10px;
    color: #64748b;
    letter-spacing: 0.5px;
}

/* Entrance Animation */
.portal {
    opacity: 0;
    animation: portalEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.akma { animation-delay: 0.1s; }
.assignify { animation-delay: 0.2s; }

@keyframes portalEntrance {
    0% {
        opacity: 0;
        transform: scale(0.8) rotateY(90deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotateY(0deg);
    }
}

/* Circuit lines animation for Akma */
.akma::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        rgba(224, 26, 140, 0.05) 20px,
        rgba(224, 26, 140, 0.05) 40px
    );
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}

.akma:hover::after {
    opacity: 1;
}

/* Aurora for Assignify */
.assignify::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 30% 40%, rgba(124, 58, 237, 0.1), transparent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}

.assignify:hover::after {
    opacity: 1;
}

/* Responsive */
@media (max-width: 600px) {
    .dual-grid {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    
    .portal {
        width: 100%;
        max-width: 260px;
    }
    
    .container {
        max-width: 100%;
        padding: 15px;
    }
    
    .portal-card {
        padding: 30px 20px;
    }
    
    .title h1 {
        font-size: 32px;
    }
}
</style>
</head>
<body>

<!-- Custom Cursor -->
<div class="custom-cursor"></div>
<div class="custom-cursor-dot"></div>

<!-- Particle Canvas -->
<canvas id="particle-canvas"></canvas>

<!-- Animated Portal Backgrounds -->
<div class="portal-bg">
    <div class="portal-left"></div>
    <div class="portal-right"></div>
</div>

<div class="container">
    <div class="portal-card">
        <div class="title">
            <h1>✦ DUAL UNIVERSE ✦</h1>
            <p>choose your portal</p>
        </div>

        <div class="dual-grid">
            <!-- AKMA PORTAL -->
            <div class="portal akma" data-user="akma">
                <div class="portal-avatar">
                    <img src="images/Fixora2.png" alt="Fixora">
                </div>
                <div class="portal-name">AKMA</div>
                <div class="portal-role">⚡ FIXORA</div>
                <div class="portal-desc">Laptop repair • Diagnostics • Tech support</div>
            </div>

            <!-- AIN / ASSIGNIFY PORTAL -->
            <div class="portal assignify" data-user="assignify">
                <div class="portal-avatar">
                    <img src="ain.jpeg" alt="Assignify">
                </div>
                <div class="portal-name">AIN</div>
                <div class="portal-role">📋 ASSIGNIFY</div>
                <div class="portal-desc">Task tracking • Deadline alerts • Smart reminders</div>
            </div>
        </div>

        <div class="portal-footer">
            <p>⚡ step into your universe • immersive experience ⚡</p>
        </div>
    </div>
</div>

<script>
$(document).ready(function(){
    
    // Custom Cursor
    const cursor = $('.custom-cursor');
    const cursorDot = $('.custom-cursor-dot');
    
    $(document).on('mousemove', function(e) {
        cursor.css({
            left: e.clientX - 16,
            top: e.clientY - 16
        });
        cursorDot.css({
            left: e.clientX - 3,
            top: e.clientY - 3
        });
    });
    
    $('a, button, .portal').on('mouseenter', function() {
        cursor.css('transform', 'scale(1.5)');
        cursorDot.css('transform', 'scale(1.5)');
    }).on('mouseleave', function() {
        cursor.css('transform', 'scale(1)');
        cursorDot.css('transform', 'scale(1)');
    });
    
    // Particle Storm
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleCount = 60;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    function createParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                alpha: Math.random() * 0.4 + 0.1,
                color: Math.random() > 0.5 ? '#e01a8c' : '#7c3aed'
            });
        }
    }
    
    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
            
            p.x += p.vx;
            p.y += p.vy;
            
            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            
            p.x = Math.max(0, Math.min(canvas.width, p.x));
            p.y = Math.max(0, Math.min(canvas.height, p.y));
        }
        
        requestAnimationFrame(drawParticles);
    }
    
    resizeCanvas();
    createParticles();
    drawParticles();
    
    window.addEventListener('resize', function() {
        resizeCanvas();
        createParticles();
    });
    
    // ========================================
    // PORTAL SELECTION - WITH portalChosen SET
    // ========================================
    $('.portal').on('click', function() {
        let user = $(this).data('user');
        let $portal = $(this);
        
        $portal.css('transform', 'scale(0.95)');
        
        setTimeout(() => {
            if (user === 'akma') {
                // SET PORTAL CHOSEN BEFORE REDIRECT
                localStorage.setItem('portalChosen', 'true');
                localStorage.setItem('selectedUser', 'akma');
                window.location.href = 'login.html';
            } else {
                alert("🌀 ASSIGNIFY PORTAL is under dimensional reconstruction.\n\nStay tuned for the next update ✨");
                $portal.css('transform', '');
            }
        }, 200);
    });
    
    // Hover particle effect
    $('.portal').on('mouseenter', function() {
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 1,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                alpha: 0.5,
                color: $(this).hasClass('akma') ? '#e01a8c' : '#7c3aed'
            });
        }
        
        setTimeout(() => {
            particles = particles.slice(0, particleCount);
        }, 2000);
    });
    
});
</script>

</body>
</html>
